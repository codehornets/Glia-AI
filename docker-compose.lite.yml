# docker-compose.lite.yml — GLIA Lite Mode
#
# Use when RAM < 8 GB. Skips Neo4j and knowledge graph extraction.
# RAG (vector search) still works — you just won't get graph-based context.
#
# Usage: docker compose -f docker-compose.lite.yml up -d
# Or:    start.bat will auto-select this if < 8 GB RAM is detected.

name: glia-lite
services:
  mongodb:
    image: mongo:7.0
    container_name: glia_mongo
    ports:
      - "127.0.0.1:27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER:-glia}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD:-gliapassword123}
    volumes:
      - mongo_data:/data/db

  chromadb:
    image: chromadb/chroma:0.6.3
    container_name: glia_chroma
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE

volumes:
  mongo_data:
  chroma_data:
