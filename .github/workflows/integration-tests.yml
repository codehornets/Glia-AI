name: glia
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pipeline-tests:
    name: Full RAG Pipeline Integration Tests
    runs-on: ubuntu-latest

    services:
      chromadb:
        image: chromadb/chroma:0.6.3
        ports:
          - "8000:8000"
        options: >-
          --health-cmd "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/api/v1/heartbeat\")'"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      mongodb:
        image: mongo:6.0
        ports:
          - "27017:27017"
        env:
          MONGO_INITDB_ROOT_USERNAME: glia
          MONGO_INITDB_ROOT_PASSWORD: gliapassword123
          MONGO_INITDB_DATABASE: gliadb_test
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})' --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      ollama:
        image: ollama/ollama:latest
        ports:
          - "11434:11434"
        options: >-
          --health-cmd "ollama list"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Pull embedding model
        run: curl -s http://localhost:11434/api/pull -d '{"name":"nomic-embed-text"}'

      - name: Run integration tests
        run: npm run test:integration
        working-directory: backend
        env:
          MONGO_URI: mongodb://glia:gliapassword123@localhost:27017/gliadb_test?authSource=admin
          CHROMA_URL: http://localhost:8000
          NEO4J_URI: ""
          NEO4J_USER: ""
          NEO4J_PASSWORD: ""
          GRAPH_BACKEND: ollama
          GLIA_NO_AUTH: "true"

  pipeline-tests-sqlite:
    name: Full RAG Pipeline Integration Tests (SQLite)
    runs-on: ubuntu-latest

    services:
      ollama:
        image: ollama/ollama:latest
        ports:
          - "11434:11434"
        options: >-
          --health-cmd "ollama list"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Pull embedding model
        run: curl -s http://localhost:11434/api/pull -d '{"name":"nomic-embed-text"}'

      - name: Run integration tests
        run: npm run test:integration
        working-directory: backend
        env:
          GLIA_STORAGE_MODE: sqlite
          SQLITE_DB_PATH: ./glia.db
          GRAPH_BACKEND: ollama
          GLIA_NO_AUTH: "true"

  mcp-tests:
    name: MCP Tool Integration Tests
    runs-on: ubuntu-latest

    services:
      ollama:
        image: ollama/ollama:latest
        ports:
          - "11434:11434"
        options: >-
          --health-cmd "ollama list"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Pull models
        run: |
          curl -s http://localhost:11434/api/pull -d '{"name":"nomic-embed-text"}'
          curl -s http://localhost:11434/api/pull -d '{"name":"llama3.1:8b"}'

      - name: Run MCP Integration Tests
        run: npx jest --config jest.config.json tests/integration/mcp.integration.test.ts --forceExit
        working-directory: backend
        env:
          GLIA_STORAGE_MODE: sqlite
          SQLITE_DB_PATH: ./glia.db
          GRAPH_BACKEND: ollama
          OLLAMA_URL: http://localhost:11434

  isolation-tests:
    name: Cross-Tenant Memory Isolation Tests
    runs-on: ubuntu-latest
    # No service dependencies — generateEmbedding is mocked at the Jest layer.
    # This test verifies SQL sessionId scoping, not embedding quality.

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Run Isolation Tests
        run: npx jest --config jest.config.json tests/integration/isolation.integration.test.ts --forceExit
        working-directory: backend
        env:
          GLIA_STORAGE_MODE: sqlite
          SQLITE_DB_PATH: ./glia-isolation-test.db
