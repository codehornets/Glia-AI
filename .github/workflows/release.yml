name: Release

on:
  push:
    tags:
      - "v*"   # triggers on: git tag v1.4.0 && git push --tags

jobs:
  release:
    name: Build & Publish GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create releases

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true   # auto-generates changelog from commits
          body: |
            ## GLIA ${{ github.ref_name }}

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for full release notes.

            ### One-Command Setup (Recommended)
            ```bash
            npx glia-setup
            ```

            ### Manual Setup
            ```bash
            git clone https://github.com/${{ github.repository }}.git
            cd Glia

            # Installation
            ./install.sh # Linux/macOS
            ./install.bat # Windows
            
            # Regular Start
            ./start.sh # Linux/macOS
            ./start.bat # Windows
            ```

            ### Load the Extension
            1. After installation, open `chrome://extensions`
            2. Enable **Developer mode**
            3. **Load unpacked** → select `Glia/extension`
            4. GLIA will automatically open the folder and page for you at the end of setup.
