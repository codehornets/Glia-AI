name: Release ArcRift Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build Backend
        working-directory: ./backend
        run: |
          npm install
          npm run build

      - name: Build Dashboard
        working-directory: ./dashboard
        run: npm install

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./dashboard
          tagName: v__VERSION__
          releaseName: 'ArcRift v__VERSION__'
          releaseBody: |
            ## ArcRift Desktop App (v__VERSION__)

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for full release notes.

            ### Installation (For Users)
            Download the appropriate installer for your Operating System from the assets below:
            - **Windows**: `ArcRift.Dashboard_x64-setup.exe`
            - **Mac**: `ArcRift.Dashboard_aarch64.dmg`
            - **Linux**: `ArcRift.Dashboard_amd64.AppImage`

            ### Installation (For Developers / Headless)
            ```bash
            git clone https://github.com/${{ github.repository }}.git
            cd ArcRift
            npx arcrift-setup
            ```

            ### Load the Extension
            1. After installation, open `chrome://extensions`
            2. Enable **Developer mode**
            3. **Load unpacked** → select `ARCRIFT/extension/dist`
            4. The ArcRift badge will now appear on supported AI chat platforms.
          releaseDraft: false
          prerelease: false
