name: Release ArcRift Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libfuse2

      - name: Build Backend
        working-directory: ./backend
        run: |
          npm install
          npm run build

      - name: Build Dashboard
        working-directory: ./dashboard
        run: npm install

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPIMAGE_EXTRACT_AND_RUN: 1
        with:
          projectPath: ./dashboard
          tagName: v__VERSION__
          releaseName: 'ArcRift v__VERSION__'
          args: ${{ matrix.platform == 'ubuntu-22.04' && '--bundles deb,rpm' || '' }}
          releaseBody: |
            ## ArcRift Desktop App (v__VERSION__)

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for full release notes.

            > **Important Prerequisite**: You must have [Node.js](https://nodejs.org/) and [Ollama](https://ollama.com/) installed on your computer before running ArcRift. If you don't have them, use the Developer (One-Command) script below to install them automatically!

            ### Installation (For Users)
            Download the appropriate installer for your Operating System from the assets below:
            - **Windows**: `ArcRift.Dashboard_x64-setup.exe`
            - **Mac**: `ArcRift.Dashboard_aarch64.dmg`
            - **Linux**: `ArcRift.Dashboard_amd64.AppImage`

            ### Installation (For Developers / Headless)
            ```bash
            git clone https://github.com/${{ github.repository }}.git
            cd ArcRift
            npx arcrift-setup
            ```

            ### Load the Extension from Source
            **For Google Chrome / Edge / Brave:**
            1. Open `chrome://extensions`
            2. Enable **Developer mode**
            3. **Load unpacked** → select `ARCRIFT/extension/dist/chrome`
            
            **For Mozilla Firefox:**
            1. Open `about:debugging#/runtime/this-firefox`
            2. Click **Load Temporary Add-on...**
            3. Select `ARCRIFT/extension/dist/firefox/manifest.json`
            
            ### Pre-Packaged Browser Extensions
            You can download the packaged browser extensions from the assets below!
            - **Firefox**: Download the `.xpi` file and drag-and-drop it into Firefox to install permanently.
            - **Chrome**: Download the `.zip` file, extract it, and use "Load unpacked" in Chrome Developer mode.
          releaseDraft: false
          prerelease: false

  build-extensions:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build and Sign Extensions
        working-directory: ./extension
        env:
          MOZILLA_API_KEY: ${{ secrets.MOZILLA_API_KEY }}
          MOZILLA_API_SECRET: ${{ secrets.MOZILLA_API_SECRET }}
        run: |
          npm install
          npm run build
          npx web-ext build -s dist/chrome -a packages/chrome --overwrite-dest
          npx web-ext sign --channel unlisted --api-key=$MOZILLA_API_KEY --api-secret=$MOZILLA_API_SECRET -s dist/firefox -a packages/firefox
          
          # Rename the files for clearer asset names on GitHub Releases
          mv packages/chrome/*.zip packages/chrome/chrome_extension.zip
          mv packages/firefox/*.xpi packages/firefox/firefox_extension.xpi

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            extension/packages/chrome/*.zip
            extension/packages/firefox/*.xpi
