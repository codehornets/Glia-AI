<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#0B0E17"/>
      <stop offset="60%" stop-color="#05070C"/>
      <stop offset="100%" stop-color="#020305"/>
    </radialGradient>
    
    <linearGradient id="leftOuter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="50%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#312E81"/>
    </linearGradient>
    <linearGradient id="leftInner" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3730A3"/>
      <stop offset="100%" stop-color="#1E1B4B"/>
    </linearGradient>

    <linearGradient id="rightInner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
    <linearGradient id="rightOuter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="60%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>

    <linearGradient id="arcGlowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="50%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>

    <filter id="neonGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <filter id="nodeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="800" height="800" rx="180" fill="url(#bgGrad)"/>

  <g stroke="#1E293B" stroke-width="1.5" opacity="0.4">
    <line x1="375" y1="260" x2="220" y2="180"/>
    <line x1="375" y1="260" x2="180" y2="340"/>
    <line x1="265" y1="560" x2="140" y2="620"/>
    <line x1="425" y1="260" x2="580" y2="160"/>
    <line x1="425" y1="260" x2="640" y2="320"/>
    <line x1="535" y1="560" x2="680" y2="640"/>
    
    <line x1="220" y1="180" x2="180" y2="340" stroke="#334155" stroke-dasharray="4 4"/>
    <line x1="580" y1="160" x2="640" y2="320" stroke="#334155" stroke-dasharray="4 4"/>
  </g>

  <g opacity="0.85">
    <circle cx="220" cy="180" r="10" fill="#A855F7" filter="url(#nodeGlow)"/>
    <circle cx="200" cy="195" r="4" fill="#A855F7" opacity="0.5"/>
    
    <circle cx="180" cy="340" r="8" fill="#0D9488"/>
    
    <circle cx="140" cy="620" r="14" fill="#F97316" filter="url(#nodeGlow)"/>
    
    <circle cx="580" cy="160" r="12" fill="#06B6D4" filter="url(#nodeGlow)"/>
    
    <circle cx="640" cy="320" r="7" fill="#FDA4AF"/>
    
    <circle cx="680" cy="640" r="9" fill="#2563EB"/>
  </g>

  <g transform="translate(0, 10)">
    
    <path d="M 375,160 L 200,560 L 265,560 L 375,310 Z" fill="url(#leftOuter)"/>
    <path d="M 375,160 L 200,560" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.12"/>
    <path d="M 375,310 L 265,560 L 335,560 L 375,390 Z" fill="url(#leftInner)"/>
    
    <path d="M 425,160 L 425,390 L 465,560 L 535,560 Z" fill="url(#rightInner)"/>
    <path d="M 425,310 L 535,560 L 600,560 L 425,160 Z" fill="url(#rightOuter)"/>
    <path d="M 600,560 L 425,160" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.12"/>
    
    <path d="M 300,446 C 340,386 460,386 500,446" 
          fill="none" 
          stroke="url(#arcGlowGrad)" 
          stroke-width="36" 
          opacity="0.35"
          stroke-linecap="round"
          filter="url(#neonGlow)"/>

    <path d="M 300,446 C 340,386 460,386 500,446" 
          fill="none" 
          stroke="#F8FAFC" 
          stroke-width="22" 
          stroke-linecap="round"/>

    <circle cx="300" cy="446" r="8" fill="#FFFFFF" filter="url(#nodeGlow)"/>
    <circle cx="500" cy="446" r="8" fill="#FFFFFF" filter="url(#nodeGlow)"/>
  </g>
</svg>
